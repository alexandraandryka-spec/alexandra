<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aleksandra Andryka | Language Redirect</title>
    <script>
      (function () {
        var langs = Array.isArray(navigator.languages) && navigator.languages.length
          ? navigator.languages
          : [navigator.language || "en"];

        function detectTargetLanguage(list) {
          for (var i = 0; i < list.length; i += 1) {
            var raw = list[i];
            if (typeof raw !== "string") continue;
            var lang = raw.trim().toLowerCase();
            if (lang.indexOf("pl") === 0) return "pl";
            if (lang.indexOf("en") === 0) return "en";
            if (lang.indexOf("de") === 0) return "de";
            if (lang.indexOf("es") === 0) return "es";
            if (lang.indexOf("fr") === 0) return "fr";
            if (lang.indexOf("it") === 0) return "it";
            if (lang.indexOf("pt") === 0) return "pt";
            if (lang.indexOf("no") === 0) return "no";
            if (lang.indexOf("nb") === 0) return "no";
            if (lang.indexOf("nn") === 0) return "no";
            if (lang.indexOf("sv") === 0) return "sv";
            if (lang.indexOf("nl") === 0) return "nl";
            if (lang.indexOf("el") === 0) return "el";
            if (lang.indexOf("tr") === 0) return "tr";
            if (lang.indexOf("hr") === 0) return "hr";
            if (lang.indexOf("bg") === 0) return "bg";
            if (lang.indexOf("ro") === 0) return "ro";
            if (lang.indexOf("da-dk") === 0) return "da";
            if (lang.indexOf("da") === 0) return "da";
            if (lang.indexOf("ja-jp") === 0) return "ja";
            if (lang.indexOf("ja") === 0) return "ja";
            if (lang.indexOf("zh-cn") === 0) return "zh-cn";
            if (lang.indexOf("zh-hans") === 0) return "zh-cn";
            if (lang.indexOf("zh") === 0) return "zh-cn";
            if (lang.indexOf("ko-kr") === 0) return "ko";
            if (lang.indexOf("ko") === 0) return "ko";
            if (lang.indexOf("ar-ae") === 0) return "ar-ae";
            if (lang.indexOf("ar") === 0) return "ar-ae";
          }
          return "en";
        }

        var target = detectTargetLanguage(langs);
        window.location.replace("./" + target + "/");
      })();
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Avenir Next", "Segoe UI", Arial, sans-serif;
        background: linear-gradient(150deg, #eef4fb, #ffffff);
        color: #1e2a3a;
      }
      .box {
        padding: 24px;
        border-radius: 16px;
        border: 1px solid #dce5f1;
        background: #fff;
      }
      .langs {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      a {
        color: #0b66c3;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div class="box">
        <p>Select language:</p>
        <div class="langs">
          <a href="./pl/">PL</a>
          <a href="./en/">EN</a>
          <a href="./de/">DE</a>
          <a href="./es/">ES</a>
          <a href="./fr/">FR</a>
          <a href="./it/">IT</a>
          <a href="./pt/">PT</a>
          <a href="./no/">NO</a>
          <a href="./sv/">SV</a>
          <a href="./nl/">NL</a>
          <a href="./el/">EL</a>
          <a href="./tr/">TR</a>
          <a href="./hr/">HR</a>
          <a href="./bg/">BG</a>
          <a href="./ro/">RO</a>
          <a href="./ko/">KO</a>
          <a href="./zh-cn/">ZH</a>
          <a href="./ja/">JA</a>
          <a href="./da/">DA</a>
          <a href="./ar-ae/">AR</a>
        </div>
      </div>
    </noscript>
  </body>
</html>

<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Podglad wizytowki - Aleksandra Andryka</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", Arial, sans-serif;
        background: linear-gradient(150deg, #e9eff7, #f7faff);
        color: #1e2a3a;
      }
      .wrap {
        max-width: 1100px;
        margin: 36px auto;
        padding: 0 16px 36px;
      }
      h1 {
        margin: 0 0 10px;
      }
      p {
        margin: 0 0 22px;
        color: #516176;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
      }
      .card {
        border-radius: 18px;
        background: #fff;
        padding: 14px;
        border: 1px solid #d4deeb;
        box-shadow: 0 10px 28px rgba(32, 54, 84, 0.12);
      }
      .card h2 {
        margin: 0 0 10px;
        font-size: 16px;
      }
      .card img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 12px;
      }
      code {
        background: #eef4fd;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Podglad wizytowki</h1>
      <p>Docelowy rozmiar: <code>85 x 55 mm</code>, pliki zawieraja spad <code>3 mm</code> z kazdej strony.</p>
      <section class="cards">
        <article class="card">
          <h2>Przod</h2>
          <img src="./wizytowka-przod.svg" alt="Przod wizytowki" />
        </article>
        <article class="card">
          <h2>Tyl</h2>
          <img src="./wizytowka-tyl.svg" alt="Tyl wizytowki z kodem QR" />
        </article>
      </section>
    </main>
  </body>
</html>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="91mm" height="61mm" viewBox="0 0 910 610" role="img" aria-labelledby="title desc">
  <title id="title">Wizytowka tyl - Aleksandra Andryka</title>
  <desc id="desc">Format 85x55 mm ze spadami 3 mm. Tyl wizytowki z kodem QR.</desc>

  <defs>
    <linearGradient id="bgBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4f8a"/>
      <stop offset="100%" stop-color="#0b66c3"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="trimMask">
      <rect x="30" y="30" width="850" height="550" rx="24" ry="24"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="910" height="610" fill="url(#bgBack)"/>

  <g clip-path="url(#trimMask)">
    <circle cx="152" cy="88" r="170" fill="url(#shine)"/>
    <circle cx="788" cy="566" r="220" fill="#ffffff" opacity="0.08"/>
  </g>

  <text x="86" y="154" fill="#ffffff" font-family="Cormorant Garamond, Georgia, serif" font-size="54" font-weight="600">Profil online</text>
  <text x="86" y="204" fill="#d7e8fb" font-family="Manrope, Avenir Next, Helvetica, Arial, sans-serif" font-size="22" font-weight="600">Zeskanuj kod QR i przejdz na strone</text>

  <line x1="86" y1="242" x2="420" y2="242" stroke="#d2e4f7" stroke-opacity="0.85" stroke-width="2.5"/>

  <text x="86" y="312" fill="#ffffff" font-family="Manrope, Avenir Next, Helvetica, Arial, sans-serif" font-size="26" font-weight="700">aleksandra.andryka.eu</text>
  <text x="86" y="354" fill="#d7e8fb" font-family="Manrope, Avenir Next, Helvetica, Arial, sans-serif" font-size="18" font-weight="600">Office Manager</text>
  <text x="86" y="384" fill="#d7e8fb" font-family="Manrope, Avenir Next, Helvetica, Arial, sans-serif" font-size="18" font-weight="600">Regionalny Manager Sprzedazy</text>

  <rect x="476" y="86" width="350" height="350" rx="20" ry="20" fill="#ffffff"/>
  <rect x="476" y="86" width="350" height="350" rx="20" ry="20" fill="none" stroke="#d3dfed" stroke-width="2"/>

  <image href="qr-aleksandra.svg" x="506" y="116" width="290" height="290" preserveAspectRatio="xMidYMid meet"/>

  <text x="651" y="474" text-anchor="middle" fill="#d9e9fb" font-family="Manrope, Avenir Next, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">Skanuj smartfonem</text>

  <text x="86" y="542" fill="#d7e8fb" font-family="Manrope, Avenir Next, Helvetica, Arial, sans-serif" font-size="16" font-weight="500">Bleed: 3 mm | Trim: 85x55 mm</text>
</svg>

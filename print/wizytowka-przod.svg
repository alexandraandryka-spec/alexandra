<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="91mm" height="61mm" viewBox="0 0 910 610" role="img" aria-labelledby="title desc">
  <title id="title">Wizytowka przod - Aleksandra Andryka</title>
  <desc id="desc">Format 85x55 mm ze spadami 3 mm. Elegancki projekt frontu wizytowki.</desc>

  <defs>
    <linearGradient id="bgFront" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eaf1fa"/>
    </linearGradient>
    <linearGradient id="accentBand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f4f8a"/>
      <stop offset="100%" stop-color="#0b66c3"/>
    </linearGradient>
    <clipPath id="trimMask">
      <rect x="30" y="30" width="850" height="550" rx="24" ry="24"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="910" height="610" fill="url(#bgFront)"/>

  <g clip-path="url(#trimMask)">
    <rect x="0" y="0" width="180" height="610" fill="url(#accentBand)"/>
    <circle cx="90" cy="520" r="230" fill="#ffffff" opacity="0.08"/>
  </g>

  <text x="58" y="112" fill="#ffffff" font-family="Cormorant Garamond, Georgia, serif" font-size="56" font-weight="600">AA</text>


  <text x="220" y="287" fill="#41556d" font-family="Manrope, Avenir Next, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="0.2">Hospitality | B2B/B2C</text>

  <line x1="220" y1="322" x2="800" y2="322" stroke="#0b66c3" stroke-width="2.5"/>

  <text x="220" y="370" fill="#26374e" font-family="Manrope, Avenir Next, Helvetica, Arial, sans-serif" font-size="22" font-weight="600">tel. +48 666 605 649</text>
